name: Build Motorola Pettyl Kernel (Hard Fix)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
          bc bison build-essential curl flex git kmod \
          libssl-dev libelf-dev gcc-aarch64-linux-gnu \
          gcc-arm-linux-gnueabi python3 libncurses5-dev

      - name: Clone Toolchain
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang

      - name: "Hard Fix: Patch Missing Kconfigs"
        run: |
          echo "Buscando Kconfigs rotos..."
          # Este comando busca todas las líneas 'source' en los Kconfig 
          # y si el archivo al que apuntan NO existe, comenta la línea.
          find . -name "Kconfig" | xargs sed -i 's/source "fs\/f2fs\/Kconfig"/# source "fs\/f2fs\/Kconfig"/g'
          
          # Por si hay más errores de archivos faltantes (limpieza general):
          if [ ! -d "fs/f2fs" ]; then
            echo "Carpeta f2fs no encontrada, aplicando parche en fs/Kconfig"
            sed -i '/f2fs\/Kconfig/s/^/#/' fs/Kconfig
          fi

      - name: Compilation
        run: |
          # Seteamos todo el entorno en un solo bloque
          export ARCH=arm
          export SUBARCH=arm
          export PATH=$PWD/clang/bin:$PATH
          export CROSS_COMPILE=arm-linux-gnueabi-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          # Limpieza y Configuración
          make O=out clean
          make O=out pettyl_defconfig
          
          # Compilación extrema
          make -j$(nproc --all) \
            O=out \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CONFIG_DEBUG_SECTION_MISMATCH=y

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: pettyl-kernel-fixed
          path: |
            out/arch/arm/boot/zImage*
            out/arch/arm/boot/dts/*.dtb

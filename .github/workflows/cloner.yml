name: Clone Motorola Kernel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  clone-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clonar kernel pettyl
        run: |
          git clone https://github.com/MotorolaMobilityLLC/kernel-msm.git -b oreo-8.1.0-release-pettyl kernel-msm

      - name: Configurar git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Commit kernel al repo
        run: |
          git add kernel-msm
          git commit -m "Add Motorola pettyl kernel"
          git push
